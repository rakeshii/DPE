services:
  - type: web
    name: finstatement-projector
    env: python
    buildCommand: apt-get update && apt-get install -y libreoffice && pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
